services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-office}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-office}
      POSTGRES_DB: ${POSTGRES_DB:-office_requests}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-office} -d ${POSTGRES_DB:-office_requests}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
